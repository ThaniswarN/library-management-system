<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h1>Student Dashboard</h1>

    <div class="card">
        <h2>Search Books</h2>
        <p>Find books available in the library.</p>
    </div>

    <div class="card">
        <h2>Borrow Books</h2>
        <p>Issue books from the library.</p>
    </div>

    <div class="card">
        <h2>Return Books</h2>
        <p>Return borrowed books.</p>
    </div>

    <div class="card">
        <h2>Logout</h2>
        <p>Exit the system safely.</p>
    </div>

</div>

</body>
</html>
